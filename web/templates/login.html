{{define "title"}}Login - Nodi{{end}}

{{define "content"}}
<main class="min-h-screen flex items-center justify-center -mx-4 px-4 bg-background w-full">
  <div id="login-card" class="w-full max-w-sm rounded-xl border border-border bg-card p-8 shadow-sm animate-ql-pop-in">
    <div class="flex flex-col items-center text-center">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-primary">
        <path d="M16 2.6L27.6 9.3V22.7L16 29.4L4.4 22.7V9.3L16 2.6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M16 16L16 2.6 M16 16L27.6 22.7 M16 16L4.4 22.7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
        <circle cx="16" cy="2.6" r="2.2" fill="currentColor"/>
        <circle cx="27.6" cy="22.7" r="2.2" fill="currentColor"/>
        <circle cx="4.4" cy="22.7" r="2.2" fill="currentColor"/>
        <circle cx="16" cy="16" r="2.8" fill="currentColor"/>
      </svg>
      <h1 class="mt-4 text-xl font-semibold tracking-tight">Nodi</h1>
      <p class="mt-1 text-sm text-muted-foreground">Sign in to your server</p>
    </div>

    <form id="login-form" class="mt-7 space-y-3">
      <div>
        <label class="text-xs font-medium text-muted-foreground uppercase tracking-wider">Username</label>
        <input id="username" name="username" autofocus class="mt-1 w-full rounded-md border border-input bg-background px-3 py-2 text-sm outline-none focus:border-ring focus:ring-2 focus:ring-ring/20 transition-shadow" placeholder="admin" autocomplete="username"/>
      </div>
      <div>
        <label class="text-xs font-medium text-muted-foreground uppercase tracking-wider">Password</label>
        <input id="password" name="password" type="password" class="mt-1 w-full rounded-md border border-input bg-background px-3 py-2 text-sm outline-none focus:border-ring focus:ring-2 focus:ring-ring/20 transition-shadow" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <p id="login-error" class="rounded-md border border-destructive/25 bg-destructive/10 px-3 py-2 text-xs text-destructive hidden" role="alert" aria-live="polite">
        Invalid credentials. Try again.
      </p>

      <button id="login-submit" type="submit" class="mt-2 flex w-full items-center justify-center gap-2 rounded-md bg-primary px-4 py-2.5 text-sm font-semibold text-primary-foreground hover:bg-primary-hover transition-colors disabled:opacity-70">
        <span id="login-spinner" class="hidden animate-spin">
          <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </span>
        <span id="login-btn-text">Login</span>
      </button>
    </form>
  </div>
</main>
{{end}}
