<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Nodi{{end}}</title>
    
    <!-- Meta -->
    <meta name="description" content="Lightweight, self-hosted web file manager.">
    
    <!-- Vite-built CSS -->
    <link href="/static/dist/assets/index.css" rel="stylesheet">
    
    <!-- Embed Nodi Favicon (Reused Logo) -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body class="bg-background text-foreground antialiased min-h-screen">
    <!-- Main Application Shell -->
    <div id="app" class="flex flex-col h-screen overflow-hidden">
        {{block "content" .}}
        <!-- Default Fallback Layout -->
        <main class="flex-1 flex items-center justify-center">
            <h1 class="text-2xl font-semibold opacity-50">Content goes here</h1>
        </main>
        {{end}}
    </div>
</body>
</html>
