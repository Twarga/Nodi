<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Nodi{{end}}</title>
    
    <!-- Meta -->
    <meta name="description" content="Lightweight, self-hosted web file manager.">
    
    <!-- Tailwind CSS (compiled output) -->
    <link href="/static/output.css" rel="stylesheet">
    
    <!-- Embed Nodi Favicon (Reused Logo) -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

    <!-- Global App JS -->
    <script src="/static/app.js" type="module" defer></script>
</head>
<body class="bg-background text-foreground antialiased min-h-screen">
    <button id="theme-toggle" aria-label="System theme" class="fixed top-4 right-4 z-50 flex h-9 w-9 items-center justify-center rounded-md text-muted-foreground hover:bg-surface-hover hover:text-foreground transition-colors">
        <svg class="theme-icon h-[18px] w-[18px]" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <!-- Main Application Shell -->
    <div id="root" class="flex flex-col h-screen overflow-hidden">
        {{block "content" .}}
        <!-- Default Fallback Layout -->
        <main class="flex-1 flex items-center justify-center">
            <h1 class="text-2xl font-semibold opacity-50">Content goes here</h1>
        </main>
        {{end}}
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
