{{define "file-row"}}
<li class="ql-row-hover group grid grid-cols-[1fr_56px] sm:grid-cols-[1fr_110px_160px_56px] items-center gap-4 border-b border-border last:border-b-0 px-4 py-2.5 cursor-pointer animate-ql-fade-in"
    onclick="onOpen('{{.Name}}', {{.IsDir}})">
  <div class="flex items-center gap-3 min-w-0">
    <svg class="w-5 h-5 {{if .IsDir}}text-icon-folder{{else}}text-icon-{{.MIME}}{{end}}">
      <use href="/static/icons.svg#icon-{{if .IsDir}}folder{{else if eq .MIME "image"}}image{{else if eq .MIME "video"}}film{{else if eq .MIME "pdf"}}file-text{{else}}file{{end}}"></use>
    </svg>
    <span class="truncate text-sm font-medium">{{.Name}}</span>
  </div>
  <div class="hidden sm:block text-right text-sm text-muted-foreground tabular">
    {{formatBytes .Size}}
  </div>
  <div class="hidden sm:block text-sm text-muted-foreground tabular">
    {{formatRelative .ModTime}}
  </div>
  <div class="relative flex justify-end">
    <button onclick="event.stopPropagation(); toggleMenu('{{.Name}}')" class="flex h-8 w-8 items-center justify-center rounded-md text-muted-foreground opacity-60 group-hover:opacity-100 hover:bg-secondary hover:text-foreground transition-all">
      <svg class="w-4 h-4"><use href="/static/icons.svg#icon-more"></use></svg>
    </button>
    <!-- Menu Placeholder - To be handled by JS or static templates -->
    <div id="menu-{{.Name}}" class="hidden absolute right-0 top-9 z-20 w-44 rounded-md border border-border bg-popover py-1 shadow-md animate-ql-fade-in">
        {{if not .IsDir}}
        <button onclick="onDownload('{{.Name}}')" class="flex w-full items-center gap-2 px-3 py-2 text-sm hover:bg-surface-hover">
            <svg class="w-[15px] h-[15px]"><use href="/static/icons.svg#icon-download"></use></svg> Download
        </button>
        {{end}}
        <button onclick="onRename('{{.Name}}')" class="flex w-full items-center gap-2 px-3 py-2 text-sm hover:bg-surface-hover">
            <svg class="w-[15px] h-[15px]"><use href="/static/icons.svg#icon-edit"></use></svg> Rename
        </button>
        <button onclick="onDelete('{{.Name}}')" class="flex w-full items-center gap-2 px-3 py-2 text-sm text-destructive hover:bg-surface-hover">
            <svg class="w-[15px] h-[15px]"><use href="/static/icons.svg#icon-trash"></use></svg> Delete
        </button>
    </div>
  </div>
</li>
{{end}}
