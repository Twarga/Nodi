{{define "title"}}Nodi{{end}}

{{define "content"}}
<header class="sticky top-0 z-30 h-14 border-b border-border bg-surface/95 backdrop-blur-sm">
  <div class="mx-auto flex h-full max-w-[1400px] items-center justify-between px-4 sm:px-6">
    <div class="flex items-center gap-2.5">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-primary">
        <path d="M16 2.6L27.6 9.3V22.7L16 29.4L4.4 22.7V9.3L16 2.6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M16 16L16 2.6 M16 16L27.6 22.7 M16 16L4.4 22.7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
        <circle cx="16" cy="2.6" r="2.2" fill="currentColor"/>
        <circle cx="27.6" cy="22.7" r="2.2" fill="currentColor"/>
        <circle cx="4.4" cy="22.7" r="2.2" fill="currentColor"/>
        <circle cx="16" cy="16" r="2.8" fill="currentColor"/>
      </svg>
      <h1 class="text-[15px] font-semibold tracking-tight">Nodi</h1>
    </div>

    <div class="flex items-center gap-1">
      <button id="theme-toggle" aria-label="System theme" class="flex h-9 w-9 items-center justify-center rounded-md text-muted-foreground hover:bg-surface-hover hover:text-foreground transition-colors">
        <svg class="theme-icon h-[18px] w-[18px]" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>

      <div id="user-menu" class="relative">
        <button id="user-menu-btn" onclick="document.getElementById('user-menu-dropdown').classList.toggle('hidden')" class="flex h-9 w-9 items-center justify-center rounded-full bg-primary text-primary-foreground text-sm font-semibold hover:bg-primary-hover transition-colors" aria-label="User menu">
          {{.Initial}}
        </button>
        <div id="user-menu-dropdown" class="hidden absolute right-0 mt-2 w-48 rounded-md border border-border bg-popover py-1 shadow-md animate-ql-fade-in z-50">
          <div class="px-3 py-2 border-b border-border">
            <div class="text-xs text-muted-foreground">Signed in as</div>
            <div class="text-sm font-medium truncate">{{.Username}}</div>
          </div>
          <div class="flex items-center gap-2 px-3 py-2 text-sm text-popover-foreground">
            <svg class="h-[15px] w-[15px]" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            About
            <span class="ml-auto text-xs text-muted-foreground tabular">v1.0</span>
          </div>
          <form action="/logout" method="post">
            <button type="submit" class="flex w-full items-center gap-2 px-3 py-2 text-sm text-destructive hover:bg-surface-hover">
              <svg class="h-[15px] w-[15px]" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Logout
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="flex-1 flex items-center justify-center">
  <h1 class="text-2xl font-semibold opacity-50">Content goes here</h1>
</main>
{{end}}
