# Optional HTTPS reverse proxy for Nodi.
#
# Usage:
#   1. Copy Caddyfile.example to Caddyfile and edit the hostname.
#   2. Run: docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d
#
# Keep Nodi LAN-only unless you understand your router/firewall exposure.

services:
  caddy:
    image: caddy:2-alpine
    container_name: nodi-caddy
    restart: unless-stopped
    depends_on:
      - nodi
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local
