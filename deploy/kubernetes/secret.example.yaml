apiVersion: v1
kind: Secret
metadata:
  name: nodi-secrets
  namespace: nodi
type: Opaque
stringData:
  QL_USER: admin
  # Generate a bcrypt hash with: htpasswd -bnBC 10 "" "your-password" | tr -d ':\n'
  QL_PASS_HASH: "$2y$10$replace-me-with-your-bcrypt-hash"
  # Generate with: openssl rand -base64 48 | tr -d '\n'
  QL_COOKIE_SECRET: "replace-with-at-least-32-random-bytes"
