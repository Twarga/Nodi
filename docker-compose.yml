services:
  nodi:
    image: ghcr.io/twarga/nodi:latest
    build:
      context: .
    container_name: nodi
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - path: nodi.env
        format: raw
    volumes:
      - nodi-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/login"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

volumes:
  nodi-data:
