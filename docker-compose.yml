# Nodi - Self-hosted web file manager
# Copy this file and create a nodi.env from .env.example before running.

services:
  nodi:
    image: ghcr.io/twarga/nodi:latest
    build:
      context: .
    container_name: nodi
    restart: unless-stopped
    ports:
      - "7319:7319"
    env_file:
      - path: nodi.env
        format: raw
    volumes:
      - nodi-files:/nodi_files
      - nodi-tmp:/tmp
    # Health check verifies the login page is reachable
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7319/login"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Large uploads are streamed to disk. Do not use tmpfs or tight memory
    # limits here; those settings can kill 20GB-100GB transfers on home LANs.
    # Log rotation to prevent disk fill
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nodi-files:
    driver: local
  nodi-tmp:
    driver: local
